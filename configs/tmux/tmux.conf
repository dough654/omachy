# Omachy tmux configuration
# Based on TPM with Catppuccin-friendly defaults

# ---------------------------------------------------------------------------
# Plugins (managed by TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'noscript/tmux-mighty-scroll'
set -g @plugin 'dracula/tmux'

# Dracula status bar
set -g @dracula-plugins "cpu-usage network-ping weather battery time"
set -g @dracula-show-powerline true
set -g @dracula-show-flags true

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g prefix C-b
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"
set -g mouse on
set -g history-limit 30000
set -s escape-time 50
set -g focus-events on
setw -g alternate-screen on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ---------------------------------------------------------------------------
# Key bindings
# ---------------------------------------------------------------------------

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'

# Split panes (open in current path)
unbind '"'
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Initialize TPM (keep at the very bottom)
# ---------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
